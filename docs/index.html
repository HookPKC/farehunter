<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FareHunter — 機票低價看板</title>
<meta name="theme-color" content="#0A0D14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0A0D14; --panel:#111623; --cell:#0D1220; --line:#1E2637;
  --amber:#FFB300; --amber-dim:#7A6222; --ink:#E9EEF7; --muted:#6E7B94;
  --deal:#45E0A0; --up:#FF6B5E;
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',
  'Noto Sans TC',sans-serif;
  padding:max(14px,env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom));
  max-width:760px;margin:0 auto}

/* ---- split-flap header ---- */
.board{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.flap{background:var(--cell);border:1px solid var(--line);border-radius:4px;
  font-family:var(--mono);font-weight:700;color:var(--amber);
  font-size:clamp(18px,5.2vw,26px);line-height:1;
  padding:8px 0;width:clamp(24px,6.4vw,34px);text-align:center;
  position:relative;overflow:hidden;
  text-shadow:0 0 12px rgba(255,179,0,.45)}
.flap::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;
  background:rgba(0,0,0,.55)}
@media (prefers-reduced-motion:no-preference){
  .flap{animation:flip .5s cubic-bezier(.3,1.4,.5,1) backwards}
  .flap:nth-child(n){animation-delay:calc(var(--i)*55ms)}
  @keyframes flip{from{transform:rotateX(90deg);opacity:0}to{transform:rotateX(0);opacity:1}}
}
.statusline{font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:.08em;margin-bottom:16px}
.statusline b{color:var(--ink);font-weight:600}
.badge-env{color:var(--amber);border:1px solid var(--amber-dim);border-radius:3px;
  padding:1px 5px;margin-left:6px}
.badge-env.aviasales{color:var(--deal);border-color:var(--deal)}

/* ---- summary strip ---- */
.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.strip div{background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px}
.strip .k{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.strip .v{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--amber);margin-top:2px}

/* ---- alert feed ---- */
h2{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;
  margin:22px 0 10px;font-weight:600}
.alerts{border:1px solid var(--line);border-radius:8px;overflow:hidden}
.alert-row{display:flex;align-items:baseline;gap:10px;padding:9px 12px;
  font-family:var(--mono);font-size:13px;border-bottom:1px solid var(--line);
  background:var(--panel)}
.alert-row:last-child{border-bottom:0}
.alert-row .rt{color:var(--ink);font-weight:700;min-width:86px}
.alert-row .pr{color:var(--deal);font-weight:700}
.alert-row .why{color:var(--muted);font-size:11px;margin-left:auto;text-align:right}
.alerts-empty{padding:14px 12px;color:var(--muted);font-size:13px;background:var(--panel)}

/* ---- route stub cards ---- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  margin-bottom:16px;position:relative}
.card-main{padding:14px 16px 12px}
.route{display:flex;align-items:baseline;gap:8px}
.route .codes{font-weight:800;font-size:20px;letter-spacing:.02em}
.route .codes .arr{color:var(--amber);font-weight:400;padding:0 2px}
.route .carriers{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em}
.price-row{display:flex;align-items:flex-end;gap:12px;margin:10px 0 4px;flex-wrap:wrap}
.big-price{font-family:var(--mono);font-weight:700;font-size:34px;color:var(--amber);
  line-height:1;text-shadow:0 0 16px rgba(255,179,0,.25);font-variant-numeric:tabular-nums}
.big-price small{font-size:13px;color:var(--muted);font-weight:400;margin-left:4px}
.delta{font-family:var(--mono);font-size:13px;font-weight:700;padding-bottom:3px}
.delta.down{color:var(--deal)}.delta.up{color:var(--up)}.delta.flat{color:var(--muted)}
.spark{display:block;width:100%;height:56px;margin:6px 0 2px}
.spark-cap{font-family:var(--mono);font-size:10px;color:var(--muted);
  display:flex;justify-content:space-between}

/* fare calendar */
.cal{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 14px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.cal::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;text-decoration:none;text-align:center;
  border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:var(--cell)}
.chip .d{font-size:10px;color:var(--muted);font-family:var(--mono)}
.chip .p{font-family:var(--mono);font-size:14px;font-weight:700;margin-top:2px;
  font-variant-numeric:tabular-nums;color:var(--ink)}
.chip .al{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap}
.chip.lo{border-color:rgba(69,224,160,.5)}.chip.lo .p{color:var(--deal)}
.chip.hi .p{color:var(--muted)}

/* perforated stub */
.stub{border-top:1.5px dashed var(--line);padding:9px 16px;display:flex;gap:16px;
  font-family:var(--mono);font-size:11px;color:var(--muted);position:relative}
.stub b{color:var(--ink);font-weight:600}
.stub::before,.stub::after{content:"";position:absolute;top:-7px;width:14px;height:14px;
  border-radius:50%;background:var(--bg);border:1px solid var(--line)}
.stub::before{left:-8px}.stub::after{right:-8px}

footer{margin-top:26px;font-size:11px;color:var(--muted);line-height:1.6;
  font-family:var(--mono)}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
</style>
</head>
<body>

  <div class="board" id="board" aria-label="FareHunter"></div>

<h2>最新警報</h2>
<div class="alerts" id="alerts"></div>

<div id="routes"></div>

<footer id="foot"></footer>

const $ = id => document.getElementById(id);
const fmt = n => Math.round(n).toLocaleString("en-US");
const WD = ["日","一","二","三","四","五","六"];
const AIRLINES = {IT:"台灣虎航",TR:"酷航",MM:"樂桃",GK:"捷星日本",
  "7C":"濟州航空",TW:"德威航空",LJ:"真航空",RS:"首爾航空",BX:"釜山航空",
  ZE:"易斯達",VZ:"泰越捷",SL:"泰國獅航",FD:"泰亞航",AK:"亞洲航空",
  D7:"AirAsia X",HB:"大灣區航空",UO:"香港快運",CX:"國泰航空",
  CI:"中華航空",BR:"長榮航空",JX:"星宇航空",JL:"日本航空",NH:"全日空",
  BC:"天馬航空",OZ:"韓亞航空",KE:"大韓航空",TG:"泰國航空",SQ:"新加坡航空",
  VJ:"越捷",VN:"越南航空",PR:"菲律賓航空","5J":"宿霧太平洋",MF:"廈門航空"};
const alName = c => AIRLINES[c] || c;

function flapTitle(){
  const b = $("board");
  "FAREHUNTER".split("").forEach((ch,i)=>{
    const s = document.createElement("span");
    s.className="flap"; s.textContent=ch; s.style.setProperty("--i",i);
    b.appendChild(s);
  });
}

function sparkline(hist, median){
  if(!hist || hist.length<2) return "";
  const w=600,h=56,pad=4;
  const ps=hist.map(x=>x.min_price);
  const lo=Math.min(...ps), hi=Math.max(...ps), span=(hi-lo)||1;
  const X=i=>pad+i*(w-2*pad)/(hist.length-1);
  const Y=v=>h-pad-(v-lo)*(h-2*pad)/span;
  const line=ps.map((v,i)=>`${i?"L":"M"}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join("");
  const medY=(median>=lo&&median<=hi)?
    `<line x1="${pad}" x2="${w-pad}" y1="${Y(median).toFixed(1)}" y2="${Y(median).toFixed(1)}"
      stroke="#6E7B94" stroke-width="1" stroke-dasharray="3 4" opacity=".6"/>`:"";
  const last=ps.length-1;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img"
    aria-label="價格趨勢圖">
    ${medY}
    <path d="${line}" fill="none" stroke="#FFB300" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(last).toFixed(1)}" cy="${Y(ps[last]).toFixed(1)}" r="3.5" fill="#FFB300"/>
  </svg>`;
}

function gfLink(o,d,dep){
  return `https://www.google.com/travel/flights?q=Flights%20from%20${o}%20to%20${d}%20on%20${dep}`;
}

function render(data){
  const t = data.generated_at.replace("T"," ").slice(5,16);
  $("statusline").innerHTML =
    `資料更新 <b>${t} UTC</b><span class="badge-env ${data.env}">${data.env.toUpperCase()}</span>`;

  $("strip").innerHTML = [
    ["觀察筆數", fmt(data.totals.observations)],
    ["監控航線", data.totals.routes],
    ["24H 警報", data.totals.alerts_24h],
  ].map(([k,v])=>`<div><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

  $("alerts").innerHTML = data.alerts.length
    ? data.alerts.slice(0,8).map(a=>`<div class="alert-row">
        <span class="rt">${a.origin}→${a.destination}</span>
        <span class="pr">${fmt(a.price)}</span>
        <span>${a.depart_date.slice(5)}</span>
        <span class="why">${a.reason} · ${a.sent_at.slice(5,10)}</span></div>`).join("")
    : `<div class="alerts-empty">尚無警報。累積約 30 筆觀察後統計規則會自動啟用。</div>`;

  $("routes").innerHTML = data.routes.map(r=>{
    const cur = r.latest.length ? Math.min(...r.latest.map(x=>x.price)) : null;
    const med = r.stats.median;
    let delta = `<span class="delta flat">—</span>`;
    if(cur!=null && med){
      const pct = (cur/med-1)*100;
      delta = pct<=-3 ? `<span class="delta down">▼ ${Math.abs(pct).toFixed(0)}% vs 中位</span>`
            : pct>= 3 ? `<span class="delta up">▲ ${pct.toFixed(0)}% vs 中位</span>`
            : `<span class="delta flat">≈ 中位數</span>`;
    }
    const all = [...new Set(r.latest.flatMap(x=>(x.carriers||"").split(",")))].filter(Boolean);
    const carriers = all.slice(0,4).map(alName).join(" · ") +
      (all.length>4 ? ` +${all.length-4}` : "");
    const ps = r.latest.map(x=>x.price).sort((a,b)=>a-b);
    const q1 = ps[Math.floor(ps.length*.25)] ?? 0, q3 = ps[Math.floor(ps.length*.75)] ?? Infinity;
    const chips = r.latest.map(x=>{
      const dt = new Date(x.depart_date+"T00:00:00");
      const cls = x.price<=q1 ? "lo" : x.price>=q3 ? "hi" : "";
      return `<a class="chip ${cls}" target="_blank" rel="noopener"
        href="${gfLink(r.origin,r.destination,x.depart_date)}">
        <div class="d">${x.depart_date.slice(5).replace("-","/")} 週${WD[dt.getDay()]}</div>
        <div class="p">${fmt(x.price)}</div>
        <div class="al">${alName((x.carriers||"").split(",")[0])}</div></a>`;
    }).join("");
    return `<div class="card">
      <div class="card-main">
        <div class="route"><span class="codes">${r.origin}<span class="arr">→</span>${r.destination}</span>
          <span class="carriers">${carriers}</span></div>
        <div class="price-row">
          <span class="big-price">${cur!=null?fmt(cur):"—"}<small>TWD 起</small></span>${delta}
        </div>
        ${sparkline(r.history, med)}
        <div class="spark-cap"><span>${(r.history[0]||{}).day||""}</span>
          <span>每日最低價</span><span>${(r.history.at(-1)||{}).day||""}</span></div>
      </div>
      <div class="cal">${chips}</div>
      <div class="stub">
        <span>歷史低 <b>${fmt(r.stats.min)}</b></span>
        <span>中位 <b>${fmt(med)}</b></span>
        <span>樣本 <b>${fmt(r.stats.n)}</b></span>
      </div>
    </div>`;
  }).join("");

  $("foot").textContent =
    "價格為 Aviasales 快取低價（來自近期搜尋，非即時報價），下訂前請點日期到 Google Flights 或 Aviasales 核對現價。" +
    (data.env==="sample" ? " 目前顯示示範資料——監控首次執行後會自動換成真實價格。" : "");
}

flapTitle();
fetch("data.json?t="+Date.now())
  .then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(render)
  .catch(()=> EMBEDDED ? render(EMBEDDED)
    : $("statusline").textContent = "找不到 data.json — 請先執行監控產生資料");
if("serviceWorker" in navigator && location.protocol==="https:")
  navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
