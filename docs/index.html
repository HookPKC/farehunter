<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="author" content="Hook Li">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FareHunter — 機票低價看板</title>
<meta name="theme-color" content="#07090F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ============ Design Tokens ============ */
:root{
  /* color: surfaces */
  --bg0:#07090F; --bg1:#0D1119; --bg2:#121826; --bg3:#171F30;
  /* color: lines */
  --line1:#1B2333; --line2:#2A3550;
  /* color: ink (AA on bg1: ink1 15.4:1, ink2 8.2:1, ink3 5.2:1) */
  --ink1:#F2F5FB; --ink2:#AAB5C9; --ink3:#8B97AD;
  /* color: semantic — amber is reserved for FARES only */
  --fare:#FFB300; --fare-soft:rgba(255,179,0,.14);
  --pos:#3FD68F;  --pos-soft:rgba(63,214,143,.12);
  --neg:#FF6B5E;  --neg-soft:rgba(255,107,94,.12);
  /* type */
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI','Noto Sans TC',sans-serif;
  --fs-xs:12px; --fs-s:13px; --fs-m:15px; --fs-l:16.5px;
  --fs-xl:20px; --fs-2xl:25px; --fs-3xl:40px;
  /* spacing scale */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px; --s8:48px;
  /* radius / shadow / motion */
  --r-s:6px; --r-m:10px; --r-l:14px;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.35);
  --t-fast:150ms cubic-bezier(.2,.8,.4,1); --t-med:250ms cubic-bezier(.2,.8,.4,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;scroll-padding-top:var(--s6)}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{background:var(--bg0);color:var(--ink1);font-family:var(--sans);
  font-size:var(--fs-m);line-height:1.55;
  padding:max(var(--s4),env(safe-area-inset-top)) var(--s4)
          calc(var(--s7) + env(safe-area-inset-bottom));
  max-width:760px;margin:0 auto}
::selection{background:var(--fare-soft)}
:focus-visible{outline:2px solid var(--fare);outline-offset:2px;border-radius:var(--r-s)}

/* ============ Header: split-flap board (signature) ============ */
.board{display:flex;gap:3px;flex-wrap:nowrap;margin-bottom:var(--s2)}
.flap{background:var(--bg2);border:1px solid var(--line1);border-radius:var(--r-s);
  font-family:var(--mono);font-weight:700;color:var(--fare);
  font-size:clamp(17px,5vw,26px);line-height:1;
  padding:var(--s2) 0;width:clamp(22px,6vw,32px);text-align:center;
  position:relative;overflow:hidden;text-shadow:0 0 12px rgba(255,179,0,.4)}
.flap::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;
  background:rgba(0,0,0,.55)}
@media (prefers-reduced-motion:no-preference){
  .flap{animation:flip .5s cubic-bezier(.3,1.4,.5,1) backwards;
        animation-delay:calc(var(--i)*50ms)}
  @keyframes flip{from{transform:rotateX(90deg);opacity:0}to{transform:rotateX(0);opacity:1}}
}
.gjudge{color:var(--ink3)}
.gjudge.lo{color:var(--pos)}
.gjudge.hi{color:var(--neg)}
.byline{font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink3);margin:2px 0 6px}
.byline strong{color:var(--ink-2);font-weight:600}
.meta{display:flex;align-items:center;gap:var(--s2);flex-wrap:wrap;
  font-family:var(--mono);font-size:var(--fs-xs);color:var(--ink3);
  letter-spacing:.08em;padding-bottom:var(--s4);border-bottom:1px solid var(--line1);
  margin-bottom:var(--s5)}
.meta b{color:var(--ink2);font-weight:600}
.badge{border:1px solid var(--line2);border-radius:4px;padding:1px 6px;
  color:var(--ink2);letter-spacing:.12em}
.badge.aviasales{color:var(--pos);border-color:rgba(63,214,143,.4)}
.badge.sample{color:var(--fare);border-color:rgba(255,179,0,.4)}

/* ============ Summary strip ============ */
.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s2);
  margin-bottom:var(--s6)}
.stat{background:var(--bg1);border:1px solid var(--line1);border-radius:var(--r-m);
  padding:var(--s3) var(--s4)}
.stat .k{font-size:11px;color:var(--ink3);letter-spacing:.16em;text-transform:uppercase}
.stat .v{font-family:var(--mono);font-size:var(--fs-xl);font-weight:700;
  color:var(--ink1);margin-top:2px;font-variant-numeric:tabular-nums}

/* ============ Sections ============ */
h2{font-size:var(--fs-xs);letter-spacing:.22em;color:var(--ink3);
  text-transform:uppercase;margin:var(--s6) 0 var(--s3);font-weight:600;
  display:flex;align-items:baseline;gap:var(--s2)}
h2 .count{font-family:var(--mono);color:var(--ink2);letter-spacing:0}

/* ============ Alerts ============ */
.alerts{border:1px solid var(--line1);border-radius:var(--r-m);overflow:hidden;
  background:var(--bg1)}
.alert-row{display:flex;align-items:baseline;gap:var(--s3);padding:var(--s3) var(--s4);
  font-family:var(--mono);font-size:var(--fs-s);border-bottom:1px solid var(--line1);
  color:var(--ink2);text-decoration:none;transition:background var(--t-fast)}
.alert-row:last-child{border-bottom:0}
.alert-row:hover{background:var(--bg2)}
.alert-row .rt{color:var(--ink1);font-weight:700;min-width:88px}
.alert-row .pr{color:var(--pos);font-weight:700;font-variant-numeric:tabular-nums}
.alert-row .why{color:var(--ink3);font-size:var(--fs-xs);margin-left:auto;
  text-align:right;white-space:nowrap}
.empty{padding:var(--s5) var(--s4);color:var(--ink3);font-size:var(--fs-m);
  background:var(--bg1);line-height:1.6}
.empty b{color:var(--ink2)}

/* ============ Route quick-nav ============ */
.routenav{display:flex;gap:var(--s2);overflow-x:auto;padding-bottom:var(--s1);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:var(--s3)}
.routenav::-webkit-scrollbar{display:none}
.routenav a{flex:0 0 auto;font-family:var(--mono);font-size:var(--fs-s);
  color:var(--ink2);text-decoration:none;background:var(--bg1);
  border:1px solid var(--line1);border-radius:999px;padding:5px var(--s3);
  transition:border-color var(--t-fast),color var(--t-fast)}
.routenav a b{color:var(--fare);font-weight:700}
.routenav a:hover{border-color:var(--line2);color:var(--ink1)}
.routenav a:active{transform:scale(.97)}

/* ============ Route cards ============ */
.card{background:var(--bg1);border:1px solid var(--line1);border-radius:var(--r-l);
  margin-bottom:var(--s4);box-shadow:var(--shadow);
  transition:border-color var(--t-med)}
.card:hover{border-color:var(--line2)}
.card-main{padding:var(--s5) var(--s5) var(--s3)}
.route{display:flex;align-items:baseline;gap:var(--s3);flex-wrap:wrap}
.route .codes{font-weight:800;font-size:var(--fs-2xl);letter-spacing:.01em}
.route .codes .arr{color:var(--fare);font-weight:400;padding:0 3px}
.route .carriers{font-size:var(--fs-s);color:var(--ink3)}
.price-row{display:flex;align-items:baseline;gap:var(--s3);
  margin:var(--s3) 0 0;flex-wrap:wrap}
.big-price{font-family:var(--mono);font-weight:700;font-size:var(--fs-3xl);
  color:var(--fare);line-height:1;text-shadow:0 0 18px rgba(255,179,0,.22);
  font-variant-numeric:tabular-nums}
.big-price small{font-size:var(--fs-m);color:var(--ink3);font-weight:400;
  margin-left:var(--s1);font-family:var(--sans)}
.pill{font-family:var(--mono);font-size:var(--fs-s);font-weight:700;
  border-radius:999px;padding:2px 9px}
.pill.down{color:var(--pos);background:var(--pos-soft)}
.pill.up{color:var(--neg);background:var(--neg-soft)}
.pill.flat{color:var(--ink3);background:var(--bg2)}
.cur-al{font-size:var(--fs-m);color:var(--ink2);margin-top:var(--s1)}
.fsline{color:var(--ink3)}
.spark{display:block;width:100%;height:60px;margin:var(--s3) 0 2px}
.spark-cap{font-family:var(--mono);font-size:11.5px;color:var(--ink3);
  display:flex;justify-content:space-between;letter-spacing:.05em}

/* fare calendar */
.cal{display:flex;gap:var(--s2);overflow-x:auto;padding:var(--s3) var(--s5) var(--s4);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  scroll-snap-type:x proximity}
.cal::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;scroll-snap-align:start;text-decoration:none;text-align:center;
  border:1px solid var(--line1);border-radius:var(--r-m);
  padding:var(--s2) var(--s3);background:var(--bg2);min-width:104px;
  transition:border-color var(--t-fast),transform var(--t-fast),background var(--t-fast)}
.chip:hover{border-color:var(--line2);background:var(--bg3)}
.chip:active{transform:scale(.96)}
.chip .d{font-size:11.5px;color:var(--ink3);font-family:var(--mono);letter-spacing:.04em}
.chip .p{font-family:var(--mono);font-size:var(--fs-l);font-weight:700;
  margin-top:3px;font-variant-numeric:tabular-nums;color:var(--ink1)}
.chip .al{font-size:11.5px;color:var(--ink3);margin-top:3px;white-space:nowrap}
.chip .fs{font-size:11px;color:var(--ink3);margin-top:4px;padding-top:4px;
  border-top:1px dashed var(--line1);font-family:var(--mono);white-space:nowrap;
  font-variant-numeric:tabular-nums}
.chip.lo{border-color:rgba(63,214,143,.45)}
.chip.lo .p{color:var(--pos)}
.chip.hi .p{color:var(--ink3)}

/* perforated stub */
.stub{border-top:1.5px dashed var(--line2);padding:var(--s3) var(--s5);
  display:flex;gap:var(--s5);font-family:var(--mono);font-size:var(--fs-xs);
  color:var(--ink3);position:relative;flex-wrap:wrap}
.stub b{color:var(--ink2);font-weight:600;font-variant-numeric:tabular-nums}
.stub::before,.stub::after{content:"";position:absolute;top:-8px;width:15px;height:15px;
  border-radius:50%;background:var(--bg0);border:1px solid var(--line1)}
.stub::before{left:-8px}.stub::after{right:-8px}

/* ============ Loading skeleton ============ */
.skel{border-radius:var(--r-m);background:var(--bg2);position:relative;overflow:hidden}
@media (prefers-reduced-motion:no-preference){
  .skel::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.045),transparent);
    animation:shimmer 1.4s infinite}
  @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
}

/* ============ Footer / misc ============ */
footer{margin-top:var(--s7);font-size:var(--fs-xs);color:var(--ink3);
  line-height:1.7;font-family:var(--mono);border-top:1px solid var(--line1);
  padding-top:var(--s4)}
.error-panel{border:1px solid rgba(255,107,94,.4);background:var(--neg-soft);
  border-radius:var(--r-m);padding:var(--s4);color:var(--ink1);font-size:var(--fs-m)}
@media (min-width:560px){
  body{padding-left:var(--s6);padding-right:var(--s6)}
  .strip{gap:var(--s3)}
}
</style>
</head>
<body>
<header>
  <div class="board" id="board" role="img" aria-label="FareHunter"></div>
  <div class="byline">by <strong>Hook Li</strong></div>
  <div class="meta" id="statusline" role="status" aria-live="polite">
    <span class="skel" style="width:220px;height:14px"></span>
  </div>
</header>

<div class="strip" id="strip" aria-label="總覽">
  <div class="skel" style="height:64px"></div>
  <div class="skel" style="height:64px"></div>
  <div class="skel" style="height:64px"></div>
</div>

<h2 id="h-alerts">最新警報 <span class="count" id="alert-count"></span></h2>
<div class="alerts" id="alerts" aria-labelledby="h-alerts">
  <div class="skel" style="height:40px;border-radius:0"></div>
</div>

<h2 id="h-routes">監控航線 <span class="count" id="route-count"></span></h2>
<nav class="routenav" id="routenav" aria-label="航線快速跳轉"></nav>
<div id="routes" aria-labelledby="h-routes">
  <div class="skel" style="height:220px;margin-bottom:16px"></div>
  <div class="skel" style="height:220px"></div>
</div>

<footer id="foot"></footer>

function flapTitle(){
  const b = $("board");
  "FAREHUNTER".split("").forEach((ch,i)=>{
    const s = document.createElement("span");
    s.className="flap"; s.textContent=ch; s.style.setProperty("--i",i);

function sparkline(hist, median){
  if(!hist || hist.length<2)
    return `<div class="spark" style="display:flex;align-items:center;
      justify-content:center;color:var(--ink3);font-size:11px;
      font-family:var(--mono);border:1px dashed var(--line1);
      border-radius:var(--r-s)">趨勢累積中 — 需要 2 天以上的資料</div>`;
  const w=600,h=60,pad=5;
  const ps=hist.map(x=>x.min_price);
  const lo=Math.min(...ps), hi=Math.max(...ps), span=(hi-lo)||1;
  const X=i=>pad+i*(w-2*pad)/(hist.length-1);
  const Y=v=>h-pad-(v-lo)*(h-2*pad)/span;
  const pts=ps.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`);
  const line="M"+pts.join(" L");
  const area=`${line} L${X(ps.length-1).toFixed(1)},${h} L${X(0).toFixed(1)},${h} Z`;
  const medY=(median>=lo&&median<=hi)?
    `<line x1="${pad}" x2="${w-pad}" y1="${Y(median).toFixed(1)}" y2="${Y(median).toFixed(1)}"
      stroke="#8B97AD" stroke-width="1" stroke-dasharray="3 4" opacity=".5"/>`:"";
  const iMin=ps.indexOf(lo), last=ps.length-1;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"
    role="img" aria-label="每日最低價趨勢，區間 ${fmt(lo)} 至 ${fmt(hi)}">
    <defs><linearGradient id="g${iMin}${last}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB300" stop-opacity=".18"/>
      <stop offset="1" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient></defs>
    ${medY}
    <path d="${area}" fill="url(#g${iMin}${last})"/>
    <path d="${line}" fill="none" stroke="#FFB300" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(iMin).toFixed(1)}" cy="${Y(lo).toFixed(1)}" r="3.5"
      fill="none" stroke="#3FD68F" stroke-width="1.5"/>
    <circle cx="${X(last).toFixed(1)}" cy="${Y(ps[last]).toFixed(1)}" r="3.5" fill="#FFB300"/>
  </svg>`;
}

function gfLink(o,d,dep,ret){
  let q = `Flights from ${o} to ${d} on ${dep}`;
  if(ret) q += ` through ${ret}`;
  return "https://www.google.com/travel/flights?q=" + encodeURIComponent(q);
}

function render(data){
  const t = data.generated_at.replace("T"," ").slice(5,16);
  $("statusline").innerHTML =
    `資料更新 <b>${t} UTC</b><span class="badge ${data.env}">${data.env.toUpperCase()}</span>`;

  $("strip").innerHTML = [
    ["價格紀錄", fmt(data.totals.observations)],
    ["監控航線", data.totals.routes],
    ["24H 警報", data.totals.alerts_24h],
  ].map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

  $("alert-count").textContent = data.alerts.length ? `· ${data.alerts.length}` : "";
  $("alerts").innerHTML = data.alerts.length
    ? data.alerts.slice(0,8).map(a=>`<a class="alert-row"
        href="#${a.origin}-${a.destination}">
        <span class="rt">${a.origin}→${a.destination}</span>
        <span class="pr">${fmt(a.price)}</span>
        <span>${a.depart_date.slice(5).replace("-","/")} 出發</span>
        <span class="why">${REASONS[a.reason]||a.reason} · ${a.sent_at.slice(5,10).replace("-","/")}</span></a>`).join("")
    : `<div class="empty"><b>目前沒有警報。</b><br>
       價格低於門檻或出現歷史新低時會列在這裡；統計規則約累積 30 筆觀察後自動啟用。</div>`;

  $("route-count").textContent = `· ${data.routes.length}`;
  if(!data.routes.length){
    $("routenav").innerHTML = "";
    $("routes").innerHTML = `<div class="empty" style="border:1px solid var(--line1);
      border-radius:var(--r-m)"><b>尚無航線資料。</b><br>
      監控首次執行後，各航線的價格與趨勢會出現在這裡。</div>`;
  } else {
    $("routenav").innerHTML = data.routes.map(r=>{
      const lo = r.latest.length ? Math.min(...r.latest.map(x=>x.price)) : null;
      return `<a href="#${r.origin}-${r.destination}">${r.origin}→${r.destination}
        ${lo!=null?`<b>${fmt(lo)}</b>`:""}</a>`;
    }).join("");

    $("routes").innerHTML = data.routes.map(r=>{
      const curOffer = r.latest.length
        ? r.latest.reduce((a,b)=>a.price<=b.price?a:b) : null;
      const cur = curOffer ? curOffer.price : null;
      const curAl = curOffer ? alFull((curOffer.carriers||"").split(",")[0]) : "";
      const fulls = r.latest.filter(x=>x.full_price);
      let bestFull = fulls.length ? fulls.reduce((a,b)=>a.full_price<=b.full_price?a:b) : null;
      if(!bestFull && r.fsc_latest)
        bestFull = {full_price:r.fsc_latest.price, full_carriers:r.fsc_latest.carriers,
                    depart_date:r.fsc_latest.depart_date};
      const med = r.stats.median;
      let pill = `<span class="pill flat">—</span>`;
      if(r.stats.n < 30){
        pill = `<span class="pill flat">樣本 ${r.stats.n}・統計累積中</span>`;
      } else if(cur!=null && med){
        const pct = (cur/med-1)*100;
        pill = pct<=-3 ? `<span class="pill down">▼ ${Math.abs(pct).toFixed(0)}% vs 中位</span>`
             : pct>= 3 ? `<span class="pill up">▲ ${pct.toFixed(0)}% vs 中位</span>`
             : `<span class="pill flat">≈ 中位數</span>`;
      }
      if(cur==null) pill = "";
      const all = [...new Set(r.latest.flatMap(x=>(x.carriers||"").split(",")))].filter(Boolean);
      const carriers = all.slice(0,4).map(alZh).join(" · ") +
        (all.length>4 ? ` +${all.length-4}` : "");
      const ps = r.latest.map(x=>x.price).sort((a,b)=>a-b);
      const q1 = ps[Math.floor(ps.length*.25)] ?? 0, q3 = ps[Math.floor(ps.length*.75)] ?? Infinity;
      const chips = r.latest.map(x=>{
        const dt = new Date(x.depart_date+"T00:00:00");
        const cls = x.price<=q1 ? "lo" : x.price>=q3 ? "hi" : "";
        const aln = x.source==="google" && !x.carriers
          ? (x.ref_carriers ? `≈ ${alFull(x.ref_carriers.split(",")[0])}` : "點入看航空")
          : alFull((x.carriers||"").split(",")[0]);
        const nights = x.return_date
          ? Math.round((new Date(x.return_date)-new Date(x.depart_date))/864e5) : null;
        return `<a class="chip ${cls}" target="_blank" rel="noopener"
          aria-label="${x.depart_date} 週${WD[dt.getDay()]}${nights?` ${nights}天來回`:""} ${fmt(x.price)} 元 ${aln}"
          href="${gfLink(r.origin,r.destination,x.depart_date,x.return_date)}">
          <div class="d">${x.depart_date.slice(5).replace("-","/")} 週${WD[dt.getDay()]}${nights?` · ${nights}天`:""}</div>
          <div class="p">${fmt(x.price)}</div>
          <div class="al">${aln}</div>
          ${x.full_price && (x.full_price !== x.price || x.full_carriers !== x.carriers)
            ? `<div class="fs">${alZh((x.full_carriers||"").split(",")[0])} ${fmt(x.full_price)}</div>` : ""}</a>`;
      }).join("");
      return `<article class="card" id="${r.origin}-${r.destination}">
        <div class="card-main">
          <div class="route"><span class="codes">${r.origin}<span class="arr">⇄</span>${r.destination}</span>
            <span class="carriers">${carriers}</span></div>
          <div class="price-row">
            <span class="big-price">${cur!=null?fmt(cur):"—"}<small>TWD 來回起</small></span>${pill}
          </div>
          <div class="cur-al">${curAl}${bestFull && !(cur!=null && bestFull.full_price===cur)
            ? ` <span class="fsline">・傳統航空最低 ${fmt(bestFull.full_price)}（${alZh((bestFull.full_carriers||"").split(",")[0])}，${bestFull.depart_date.slice(5).replace("-","/")}）</span>` : ""}</div>
          ${sparkline(r.history, med)}
          <div class="spark-cap"><span>${(r.history[0]||{}).day||""}</span>
            <span>每日最低價</span><span>${(r.history.at(-1)||{}).day||""}</span></div>
        </div>
        <div class="cal">${chips}</div>
        <div class="stub">
          <span>歷史低 <b>${fmt(r.stats.min)}</b></span>
          <span>中位 <b>${fmt(med)}</b></span>
          <span>樣本 <b>${fmt(r.stats.n)}</b></span>
          ${(() => {
            const LV = {low:["Google 判定偏低","lo"], typical:["Google 判定正常",""],
                        high:["Google 判定偏高","hi"]};
            const i = r.insight;
            if(!i || !LV[i.price_level]) return "";
            const [t, c] = LV[i.price_level];
            const rng = i.typical_low
              ? `・常見 ${fmt(i.typical_low)}–${fmt(i.typical_high)}` : "";
            return `<span class="gjudge ${c}">${t}${rng}</span>`;
          })()}
        </div>
      </article>`;
    }).join("");
  }

  $("foot").textContent =
    "價格：8 天內的 Google 實價優先顯示，其餘為 Aviasales 快取低價。「≈ 航空」表示由快取推估的航空公司，實際承運請點日期到 Google Flights 確認。 © FareHunter · 作者 Hook Li" +
    (data.env==="sample" ? " 目前顯示示範資料——監控首次執行後會自動換成真實價格。" : "");
}

flapTitle();
fetch("data.json?t="+Date.now())
  .then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(render)
  .catch(()=>{
    if(EMBEDDED){ render(EMBEDDED); return; }
    $("statusline").textContent = "";
    $("strip").innerHTML = "";
    $("alerts").innerHTML = "";
    $("routes").innerHTML = `<div class="error-panel"><b>讀不到資料。</b><br>
      找不到 data.json——請先在 GitHub Actions 執行一次 FareHunter Monitor，
      執行完成後重新整理此頁。</div>`;
  });
if("serviceWorker" in navigator && location.protocol==="https:")
  navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
