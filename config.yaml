# FareHunter v1.1 — 監控路線設定（資料來源：Travelpayouts / Aviasales 快取）
defaults:
  currency: twd
  months_ahead: 6           # 監控當月起共 6 個月
  one_way: false            # false = 來回票價
  non_stop: true            # 台日全直飛航線，轉機票不切實際
  drop_pct: 25              # 低於中位數 25% 觸發
  min_history: 30           # 累積 30 筆觀察後才啟用統計規則
  pause_seconds: 0.6
  # market: tw              # 資料來源市場；先不設，首跑後視資料量再調整

routes:
  - origin: TPE
    destination: NRT
    absolute_threshold: 7000    # TWD 來回，第一天就能用的絕對門檻
  - origin: TPE
    destination: KIX
    absolute_threshold: 6500
  - origin: KHH
    destination: NRT
    absolute_threshold: 8000
  - origin: KHH
    destination: KIX
    absolute_threshold: 7500
  - origin: KHH
    destination: CTS      # 札幌新千歲
    absolute_threshold: 10000
  - origin: KHH
    destination: FUK      # 福岡
    absolute_threshold: 7000
  - origin: KHH
    destination: OKA      # 沖繩那霸
    absolute_threshold: 6000
  - origin: KHH
    destination: NGO      # 名古屋中部
    absolute_threshold: 7500
