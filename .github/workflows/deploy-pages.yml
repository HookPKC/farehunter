name: Deploy Pages

# 資料類 workflow 由內建 GITHUB_TOKEN commit，其 push 不會觸發 on:push；
# 因此改用 workflow_run，在每個資料 workflow 完成後才發佈最新 docs/。
on:
  workflow_run:
    workflows:
      - "FareHunter Monitor"
      - "FSC Snapshot"
      - "Verify Airlines"
      - "Google Price Calendar Sweep"
      - "Long Range Sweep"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
