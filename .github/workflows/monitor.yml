name: FareHunter Monitor

on:
  schedule:
    - cron: "0 */2 * * *"     # 每 2 小時（UTC）
  workflow_dispatch:            # 允許手動觸發

permissions:
  contents: write               # 允許把 prices.db 提交回 repo

concurrency:
  group: farehunter
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pip install pytest && python -m pytest tests/ -q

      - name: Run monitor
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python run.py

      - name: Export dashboard data
        run: python src/farehunter/export_web.py prices.db docs/data.json

      - name: Commit price history
        run: |
          git config user.name "farehunter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.db docs/data.json
          git diff --cached --quiet || git commit -m "chore: price observations $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase
          git push
